name: "AdorniLeaks — Agente Diario"

on:
  # Cron: todos los días a las 05:00 AM hora Argentina (UTC-3 = 08:00 UTC)
  schedule:
    - cron: "0 8 * * *"

  # También se puede ejecutar manualmente desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Ejecutar en modo dry-run (sin escribir en BD)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      limit:
        description: "Límite de artículos a procesar (0 = sin límite)"
        required: false
        default: "0"
        type: string

jobs:
  correr-agente:
    name: "Correr Agente Indexador"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agent/requirements.txt"

      - name: "📦 Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install -r agent/requirements.txt

      - name: "🤖 Ejecutar agente"
        working-directory: agent
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_MODEL:           "llama-3.3-70b-versatile"
          SCORE_MINIMO:         "6"
          MAX_ARTICULOS:        "50"
        run: |
          ARGS=""

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "${{ github.event.inputs.limit }}" != "0" ] && [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi

          python main.py $ARGS

      - name: "📋 Subir logs como artefacto"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "logs-${{ github.run_id }}"
          path: "agent/logs/"
          retention-days: 30
          if-no-files-found: ignore
